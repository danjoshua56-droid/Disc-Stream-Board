name: Stream Check

on:
  schedule:
    # Times are Eastern converted to UTC (EDT = UTC-4, EST = UTC-5)
    # In winter (EST) shift all hours +1 in UTC — see README for details
    #
    # Every 10 min: 6pm-midnight ET = 22:00-03:59 UTC (spans midnight UTC)
    - cron: '*/10 22-23 * * *'
    - cron: '*/10 0-3 * * *'
    # Every 30 min: midnight-6pm ET = 04:00-21:59 UTC
    - cron: '*/30 4-21 * * *'
  # Allow manual trigger from the Actions tab at any time
  workflow_dispatch:

jobs:
  check-streams:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run stream check
        env:
          TWITCH_CLIENT_ID:     ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python stream_check.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json channels.json
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: update stream data [skip ci]"
          git push
